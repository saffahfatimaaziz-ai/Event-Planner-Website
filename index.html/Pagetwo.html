<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="max-width:900px; padding:30px; border:1px solid #ccc; border-radius:12px; font-family:Arial, sans-serif;">
  <h2 style="text-decoration:underline; font-size:30px; font-weight:800; margin-bottom:8px;">Booking Form</h2>
  <p style="font-size:15px; color:#555; margin-top:0; margin-bottom:25px;">
    Please fill out this form to complete your booking. All fields are required.
  </p>
  
  <label>Full Name</label>
  <input type="text" name="name" placeholder="Enter your full name" required style="width:100%; padding:12px; margin:6px 0 18px;">

  <label>Phone Number</label>
  <input type="tel" name="phone" placeholder="03XXXXXXXXX" required style="width:100%; padding:12px; margin:6px 0 18px;">

  <label>Email</label>
  <input type="email" name="email" required style="width:100%; padding:12px; margin:6px 0 18px;">

  <label>Gender</label>
  <select name="gender" required style="width:100%; padding:12px; margin:6px 0 18px;">
    <option value="">Select gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
  </select>

  <label>Event Type</label>
  <select name="event" required style="width:100%; padding:12px; margin:6px 0 18px;">
    <option value="">Select event type</option>
    <option value="wedding">Wedding</option>
    <option value="birthday">Birthday</option>
    <option value="meeting">Meeting</option>
    <option value="other">Other</option>
  </select>

  <label>Number of Guests</label>
  <input type="number" name="guests" min="1" required style="width:100%; padding:12px; margin:6px 0 18px;">

  <label>Food Preferences</label>
  <textarea name="food" required style="width:100%; padding:12px; margin:6px 0 18px; min-height:80px;"></textarea>

  <label>Decoration Preferences</label>
  <textarea name="decoration" style="width:100%; padding:12px; margin:6px 0 18px; min-height:80px;"></textarea>

  <label>City</label>
  <input type="text" name="city" required style="width:100%; padding:12px; margin:6px 0 18px;">

  <label>Address / Location</label>
  <textarea name="address" required style="width:100%; padding:12px; margin:6px 0 18px; min-height:80px;"></textarea>

  <button type="submit" style="padding:14px 28px; background:#000; color:#fff; border:none; border-radius:6px; font-size:17px; font-weight:600;">Submit</button>
</div>
</body>
</html>
